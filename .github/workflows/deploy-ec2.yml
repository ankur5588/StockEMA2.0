name: Deploy to EC2

on:
  push:
    branches:
      - main-deployment
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload source bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/tmp/chartink-release"
          overwrite: true
          rm: true

      - name: Provision and deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOMAIN: ${{ secrets.APP_DOMAIN }}
          CONTACT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          CI: "true"
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOMAIN,CONTACT_EMAIL,CI
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/opt/chartink-trade"
            SRC_DIR="/tmp/chartink-release"

            if [ -z "${DOMAIN:-}" ]; then
              echo "APP_DOMAIN secret is required"
              exit 1
            fi
            if [ -z "${CONTACT_EMAIL:-}" ]; then
              echo "LETSENCRYPT_EMAIL secret is required"
              exit 1
            fi

            sudo mkdir -p "$APP_DIR"
            sudo rsync -a --delete \
              --exclude ".git" \
              --exclude "frontend/node_modules" \
              --exclude "backend/.venv" \
              "$SRC_DIR"/ "$APP_DIR"/
            sudo chmod +x "$APP_DIR/deploy.sh"
            sudo sed -i "s|^MONGO_APP_PWD=\"\\\$(cat \\\"\\\$MONGO_APP_PWD_FILE\\\")\"$|MONGO_APP_PWD=\"\$(cat \\\"\\\$MONGO_APP_PWD_FILE\\\")\"\\nMONGO_APP_PWD_ENC=\"\$(python3 -c \\\"import urllib.parse,sys; print(urllib.parse.quote_plus(sys.argv[1]))\\\" \\\"\\\$MONGO_APP_PWD\\\")\"|" "$APP_DIR/deploy.sh"
            sudo sed -i "s|^MONGO_URL=mongodb://chartink:\\\${MONGO_APP_PWD}@127.0.0.1:27017/\\\${DB_NAME}?authSource=\\\${DB_NAME}$|MONGO_URL=mongodb://chartink:\\\${MONGO_APP_PWD_ENC}@127.0.0.1:27017/\\\${DB_NAME}?authSource=\\\${DB_NAME}|" "$APP_DIR/deploy.sh"
            printf 'y\n' | sudo "$APP_DIR/deploy.sh" "$DOMAIN" "$CONTACT_EMAIL"

            curl -fsS --retry 10 --retry-delay 3 http://127.0.0.1:8001/api/health >/dev/null
            curl -kfsS --retry 10 --retry-delay 3 --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/api/health" >/dev/null
            echo "Deployment and in-server health checks completed successfully."
