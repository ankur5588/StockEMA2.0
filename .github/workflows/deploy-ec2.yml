name: Deploy to EC2

on:
  push:
    branches:
      - main-deployment
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload source bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/tmp/chartink-release"
          overwrite: true
          rm: true

      - name: Provision and deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOMAIN: ${{ secrets.APP_DOMAIN }}
          CONTACT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOMAIN,CONTACT_EMAIL
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/opt/chartink-trade"
            SRC_DIR="/tmp/chartink-release"

            if [ -z "${DOMAIN:-}" ]; then
              echo "APP_DOMAIN secret is required"
              exit 1
            fi
            if [ -z "${CONTACT_EMAIL:-}" ]; then
              echo "LETSENCRYPT_EMAIL secret is required"
              exit 1
            fi

            sudo mkdir -p "$APP_DIR"
            sudo rsync -a --delete \
              --exclude ".git" \
              --exclude "frontend/node_modules" \
              --exclude "backend/.venv" \
              "$SRC_DIR"/ "$APP_DIR"/
            sudo chmod +x "$APP_DIR/deploy.sh"
            sudo "$APP_DIR/deploy.sh" "$DOMAIN" "$CONTACT_EMAIL"
